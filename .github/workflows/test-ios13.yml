name: iOS 13 compat build & smoke test

# Verifies the app compiles with iOS 13 minimum deployment target.
# A live iOS 13 simulator run is not possible on any current CI host (all are
# macOS 13+, which CoreSimulator hard-blocks for iOS 13 runtimes).
# The oldest available hosted runtime is iOS 16.4 / macOS 14.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || \
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s $(ls /Applications/Xcode*.app | sort -V | tail -1)
          xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list runtimes

      - name: Pick oldest available iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
devices = []
for runtime, devs in data['devices'].items():
    for d in devs:
        if d.get('isAvailable') and 'iPhone' in d['name']:
            devices.append((runtime, d['udid'], d['name']))
devices.sort()  # oldest runtime first
rt, udid, name = devices[0]
print(udid)
import sys; print(f'Using {name} on {rt}', file=sys.stderr)
")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Build — iOS 13.0 deployment target
        run: |
          xcodebuild \
            -project PS5PayloadSender.xcodeproj \
            -scheme PS5PayloadSender \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -configuration Debug \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            clean build \
            2>&1 | tail -30

      - name: Install & launch on simulator
        run: |
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "PS5PayloadSender.app" \
                  -not -path "*/iphoneos/*" | head -1)
          xcrun simctl install "$SIMULATOR_UDID" "$APP"
          xcrun simctl launch "$SIMULATOR_UDID" com.rolex.P5PS

      - name: Screenshot
        run: |
          sleep 4
          xcrun simctl io "$SIMULATOR_UDID" screenshot /tmp/screenshot.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ios13-target
          path: /tmp/screenshot.png
